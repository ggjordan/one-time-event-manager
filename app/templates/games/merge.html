{% extends "layout.html" %}

{% block title %}Merge games{% endblock %}

{% block content %}
  <h2>Merge duplicate games</h2>

  <p>Select which game to merge <strong>from</strong> (will be removed) and which to merge <strong>into</strong> (will keep all events). For example, merge "MtG" into "Magic".</p>

  <form method="post">
    <div class="field">
      <label for="from_id">Merge FROM (remove):</label>
      <select id="from_id" name="from_id" required>
        <option value="">— Select —</option>
        {% for g in games %}
          <option value="{{ g.id }}">{{ g.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field">
      <label for="to_id">Merge INTO (keep):</label>
      <select id="to_id" name="to_id" required>
        <option value="">— Select —</option>
        {% for g in games %}
          <option value="{{ g.id }}">{{ g.name }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Merge</button>
    <a href="{{ url_for('games.list_games') }}" class="btn btn-secondary">Cancel</a>
  </form>
{% endblock %}
