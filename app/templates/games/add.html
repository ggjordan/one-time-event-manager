{% extends "layout.html" %}

{% block title %}Add game{% endblock %}

{% block content %}
  <h2>Add game</h2>
  <form method="post">
    <div class="field">
      <label for="name">Game name</label>
      <input id="name" name="name" required placeholder="e.g. New TCG" />
    </div>
    <button type="submit" class="btn btn-primary">Add</button>
    <a href="{{ next_url }}" class="btn">Cancel</a>
  </form>
{% endblock %}
