{% extends "layout.html" %}

{% block title %}Add team member{% endblock %}

{% block content %}
  <h2>Add team member</h2>

  <form method="post">
    <div class="field">
      <label for="name">Name</label>
      <input id="name" name="name" required placeholder="e.g. Zach" />
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required placeholder="e.g. zach@store.com" />
    </div>
    <button type="submit" class="btn btn-primary">Add</button>
    <a href="{{ url_for('users.list_users') }}" class="btn btn-secondary">Cancel</a>
  </form>
{% endblock %}
