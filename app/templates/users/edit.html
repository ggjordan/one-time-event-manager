{% extends "layout.html" %}

{% block title %}Edit {{ user.name }}{% endblock %}

{% block content %}
  <h2>Edit team member</h2>
  <form method="post">
    <div class="field">
      <label for="name">Name</label>
      <input id="name" name="name" value="{{ user.name }}" required />
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" value="{{ user.email }}" required />
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('users.list_users') }}" class="btn btn-secondary">Cancel</a>
    <form action="{{ url_for('users.delete_user', user_id=user.id) }}" method="post" style="display: inline;" onsubmit="return confirm('Permanently delete {{ user.name }}? Their events will be deleted and their assigned tasks unassigned.');">
      <button type="submit" class="btn btn-secondary" style="margin-left: 0.5rem;">Delete user</button>
    </form>
  </form>
{% endblock %}
