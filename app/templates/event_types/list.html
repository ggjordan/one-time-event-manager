{% extends "layout.html" %}

{% block title %}Event types{% endblock %}

{% block content %}
  <h2>Event types</h2>
  <p>
    <a href="{{ url_for('event_types.add_event_type') }}" class="btn btn-primary">Add event type</a>
    <a href="{{ url_for('event_types.merge_event_types') }}" class="btn btn-secondary">Merge duplicates</a>
  </p>
  {% if event_types %}
    <table>
      <thead>
        <tr><th>Name</th></tr>
      </thead>
      <tbody>
        {% for et in event_types %}
          <tr><td>{{ et.name }}</td></tr>
        {% endfor %}
      </tbody>
    </table>
  {% else %}
    <p>No event types yet. <a href="{{ url_for('event_types.add_event_type') }}">Add the first one</a>.</p>
  {% endif %}
{% endblock %}
