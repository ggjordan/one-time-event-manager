{% extends "layout.html" %}

{% block title %}Merge event types{% endblock %}

{% block content %}
  <h2>Merge duplicate event types</h2>

  <p>Select which event type to merge <strong>from</strong> (will be removed) and which to merge <strong>into</strong> (will keep all events).</p>

  <form method="post">
    <div class="field">
      <label for="from_id">Merge FROM (remove):</label>
      <select id="from_id" name="from_id" required>
        <option value="">— Select —</option>
        {% for et in event_types %}
          <option value="{{ et.id }}">{{ et.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="field">
      <label for="to_id">Merge INTO (keep):</label>
      <select id="to_id" name="to_id" required>
        <option value="">— Select —</option>
        {% for et in event_types %}
          <option value="{{ et.id }}">{{ et.name }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Merge</button>
    <a href="{{ url_for('event_types.list_event_types') }}" class="btn">Cancel</a>
  </form>
{% endblock %}
